  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_AUTH}?sslmode=disable
      REDIS_ADDR: ${REDIS_ADDR}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET} 
    depends_on:
      - postgres
      - redis
    ports:
      - "50051:50051"
    networks:
      - minibank-net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_USER}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET} 
    depends_on:
      - postgres
    ports:
      - "50052:50052"
    networks:
      - minibank-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_PAYMENT}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET} 
    depends_on:
      - postgres
    ports:
      - "50053:50053"
    networks:
      - minibank-net