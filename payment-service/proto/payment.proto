syntax = "proto3";

package payment;

option go_package = "github.com/sonni-a/minibank/api/payment;payment";

// Amounts and balances are in minor currency units (e.g. kopecks); no floating-point on the wire.

service PaymentService {
  rpc CreateAccount(CreateAccountRequest) returns (AccountResponse);
  rpc GetBalance(GetBalanceRequest) returns (BalanceResponse);
  rpc Deposit(DepositRequest) returns (BalanceResponse);
  rpc Transfer(TransferRequest) returns (TransferResponse);
}

message CreateAccountRequest {
  int64 user_id = 1;
}

message GetBalanceRequest {
  int64 user_id = 1;
}

message DepositRequest {
  int64 user_id = 1;
  int64 amount_minor = 2;
}

message TransferRequest {
  int64 from_user_id = 1;
  int64 to_user_id = 2;
  int64 amount_minor = 3;
}

message AccountResponse {
  int64 user_id = 1;
  int64 balance_minor = 2;
}

message BalanceResponse {
  int64 balance_minor = 1;
}

message TransferResponse {
  string message = 1;
}